spring:
  datasource:
    url: jdbc:h2:mem:polizasdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

app:
  api-key: 123456
  core-mock-url: http://localhost:8080
  ipc-default: 0.09
