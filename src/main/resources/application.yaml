spring:
  application:
    name: polizas
  datasource:
    url: jdbc:h2:mem:polizasdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

app:
  api-key: ${APP_API_KEY}
  core-mock-url: ${CORE_MOCK_URL:http://localhost:8080}
